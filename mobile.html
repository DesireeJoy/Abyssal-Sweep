<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Abyssal Sweep</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0d2b4e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Abyssal Sweep"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    :root { color-scheme: light; }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: linear-gradient(180deg, #0a1628 0%, #0d2b4e 40%, #0a3d5c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 12px 8px;
      font-family: 'Georgia', serif;
      color: #c8e8f8;
      overflow-x: hidden;
    }

    h1 {
      font-size: 1.6rem;
      color: #7dd8f8;
      text-shadow: 0 0 20px #3ab5e8, 0 0 40px #1a7ca8;
      margin-bottom: 2px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 0.75rem;
      color: #5ba8c8;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-btn {
      background: rgba(13, 60, 100, 0.7);
      border: 1px solid #2a7aaa;
      color: #7dd8f8;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 0.75rem;
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .difficulty-btn.active {
      background: rgba(42, 122, 170, 0.5);
      border-color: #7dd8f8;
      box-shadow: 0 0 10px rgba(125, 216, 248, 0.3);
    }

    .hud {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 10px;
      background: rgba(5, 20, 45, 0.7);
      border: 1px solid #2a5a7a;
      border-radius: 12px;
      padding: 8px 18px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .hud-label {
      font-size: 0.55rem;
      color: #5ba8c8;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hud-value {
      font-size: 1.3rem;
      color: #f87060;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(248, 112, 96, 0.6);
      min-width: 40px;
      text-align: center;
    }

    .hud-value.timer { color: #7dd8f8; text-shadow: 0 0 10px rgba(125, 216, 248, 0.5); }

    #reset-btn {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      transition: transform 0.2s;
      line-height: 1;
      touch-action: manipulation;
    }

    .board-wrapper {
      background: rgba(5, 20, 45, 0.5);
      border: 2px solid #2a5a7a;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 30px rgba(0, 80, 140, 0.4), inset 0 0 40px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
      max-width: 100%;
    }

    .board-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 30px,
        rgba(10, 50, 80, 0.08) 30px, rgba(10, 50, 80, 0.08) 31px
      ),
      repeating-linear-gradient(
        90deg, transparent, transparent 30px,
        rgba(10, 50, 80, 0.08) 30px, rgba(10, 50, 80, 0.08) 31px
      );
      pointer-events: none;
    }

    #board {
      display: grid;
      position: relative;
      z-index: 1;
    }

    .cell {
      border-radius: 4px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      position: relative;
      user-select: none;
      touch-action: none;
      transition: background 0.1s, transform 0.08s;
    }

    .cell.hidden {
      background: linear-gradient(145deg, #1a4a6a, #0f3050);
      box-shadow: 2px 2px 4px rgba(0,0,0,0.5), -1px -1px 2px rgba(80,160,220,0.1);
    }

    .cell.hidden:active {
      transform: scale(0.92);
    }

    .cell.revealed {
      background: rgba(5, 25, 50, 0.7);
      box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
    }

    .cell.flagged {
      background: linear-gradient(145deg, #1a3a5a, #0f2540);
      box-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 8px rgba(248, 200, 50, 0.2);
    }

    .cell.mine-hit {
      background: radial-gradient(circle, #8b1a0a, #500a02) !important;
      box-shadow: 0 0 20px rgba(248, 80, 50, 0.8) !important;
      animation: shake 0.3s ease;
    }

    .cell.mine-revealed {
      background: rgba(60, 10, 5, 0.5);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-3px) rotate(-3deg); }
      75% { transform: translateX(3px) rotate(3deg); }
    }

    .n1 { color: #58d8f8; }
    .n2 { color: #58e878; }
    .n3 { color: #f87060; }
    .n4 { color: #a060f8; }
    .n5 { color: #f8a050; }
    .n6 { color: #50f8d8; }
    .n7 { color: #f85080; }
    .n8 { color: #c0c0c0; }

    .legend {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.7rem;
      color: #5ba8c8;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend span { display: flex; align-items: center; gap: 4px; }

    .message-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 15, 35, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .message-overlay.show { display: flex; }

    .message-box {
      background: linear-gradient(160deg, #0d2b4e, #051428);
      border: 2px solid #2a7aaa;
      border-radius: 20px;
      padding: 30px 36px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0, 100, 180, 0.5);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 90vw;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .message-icon { font-size: 3rem; margin-bottom: 10px; }
    .message-title { font-size: 1.6rem; color: #7dd8f8; margin-bottom: 6px; text-shadow: 0 0 20px #3ab5e8; }
    .message-sub { color: #5ba8c8; margin-bottom: 20px; font-size: 0.9rem; }

    .play-again-btn {
      background: linear-gradient(135deg, #1a5a8a, #0d3558);
      border: 2px solid #7dd8f8;
      color: #7dd8f8;
      padding: 10px 26px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: 'Georgia', serif;
      letter-spacing: 1px;
      transition: all 0.2s;
      box-shadow: 0 0 15px rgba(125, 216, 248, 0.2);
      touch-action: manipulation;
    }

    .bubbles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -20px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(125, 216, 248, 0.3), rgba(30, 100, 160, 0.05));
      border: 1px solid rgba(125, 216, 248, 0.15);
      animation: rise linear infinite;
    }

    @keyframes rise {
      to { transform: translateY(-110vh) translateX(var(--drift)); opacity: 0; }
    }

    #tentacle-canvas {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 110;
      pointer-events: none;
    }
    #tentacle-canvas.active { display: block; }

    .click-bubble {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 200;
      background: radial-gradient(circle at 30% 30%, rgba(125, 216, 248, 0.7), rgba(30, 100, 160, 0.1));
      border: 1px solid rgba(125, 216, 248, 0.6);
      animation: clickBubbleRise 0.9s ease-out forwards;
    }

    @keyframes clickBubbleRise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-80px) translateX(var(--bdrift)) scale(0.2); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<h1>🦑 KRAKEN SWEEP</h1>
<p class="subtitle">— The Deep Awaits —</p>

<div class="controls">
  <button class="difficulty-btn active" onclick="setDifficulty('easy')">Calm (9×9)</button>
  <button class="difficulty-btn" onclick="setDifficulty('medium')">Rough (16×16)</button>
  <button class="difficulty-btn" onclick="setDifficulty('hard')">Kraken (16×30)</button>
</div>

<div class="hud">
  <div class="hud-item">
    <span class="hud-label">🦑 Lurking</span>
    <span class="hud-value" id="mine-count">10</span>
  </div>
  <button id="reset-btn" title="New Game" onclick="initGame()">🌊</button>
  <div class="hud-item">
    <span class="hud-label">⏱ Depth</span>
    <span class="hud-value timer" id="timer">0</span>
  </div>
</div>

<div class="board-wrapper">
  <div id="board"></div>
</div>

<div class="legend">
  <span>Tap = Reveal</span>
  <span>Double-tap = 🍖 Flag</span>
  <span>🦑 = Lurking</span>
  <span>🐙 = Revealed</span>
</div>

<canvas id="tentacle-canvas"></canvas>

<div class="message-overlay" id="overlay">
  <div class="message-box">
    <div class="message-icon" id="msg-icon">🦑</div>
    <div class="message-title" id="msg-title">CAUGHT!</div>
    <div class="message-sub" id="msg-sub">The Kraken got you — but he's happy about it!</div>
    <button class="play-again-btn" onclick="closeOverlay()">Brave the Depths Again</button>
  </div>
</div>

<script>
  const DIFFICULTIES = {
    easy:   { rows: 9,  cols: 9,  mines: 10 },
    medium: { rows: 16, cols: 16, mines: 40 },
    hard:   { rows: 30, cols: 16, mines: 99 },
  };

  let difficulty = 'easy';
  let rows, cols, mineCount;
  let board = [], revealed = [], flagged = [], mineLocations = [];
  let gameOver = false, gameWon = false, firstClick = true;
  let timerInterval = null, seconds = 0;
  let flagCount = 0;

  function cellSize() {
    // Fit the board to screen width with a bit of padding
    const padding = 36; // board-wrapper padding + body padding
    const gap = 2;
    const availableWidth = Math.min(window.innerWidth, 480) - padding;
    // Use cols for the current difficulty
    const cfg = DIFFICULTIES[difficulty];
    const size = Math.floor((availableWidth - gap * (cfg.cols - 1)) / cfg.cols);
    return Math.max(22, Math.min(size, 40));
  }

  function setDifficulty(d) {
    difficulty = d;
    document.querySelectorAll('.difficulty-btn').forEach((b, i) => {
      b.classList.toggle('active', ['easy','medium','hard'][i] === d);
    });
    initGame();
  }

  function initGame() {
    clearInterval(timerInterval);
    seconds = 0;
    document.getElementById('timer').textContent = '0';
    gameOver = false; gameWon = false; firstClick = true; flagCount = 0;

    const cfg = DIFFICULTIES[difficulty];
    rows = cfg.rows; cols = cfg.cols; mineCount = cfg.mines;

    board = Array.from({length: rows}, () => Array(cols).fill(0));
    revealed = Array.from({length: rows}, () => Array(cols).fill(false));
    flagged = Array.from({length: rows}, () => Array(cols).fill(false));
    mineLocations = [];

    document.getElementById('mine-count').textContent = mineCount;
    document.getElementById('overlay').classList.remove('show');
    renderBoard();
  }

  function placeMines(safeR, safeC) {
    let placed = 0;
    while (placed < mineCount) {
      const r = Math.floor(Math.random() * rows);
      const c = Math.floor(Math.random() * cols);
      if (board[r][c] === -1) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      board[r][c] = -1;
      mineLocations.push([r, c]);
      placed++;
    }
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (board[r][c] !== -1)
          board[r][c] = countAdjMines(r, c);
  }

  function countAdjMines(r, c) {
    let n = 0;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r+dr, nc = c+dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) n++;
      }
    return n;
  }

  function renderBoard() {
    const boardEl = document.getElementById('board');
    const sz = cellSize();
    const gap = 2;
    boardEl.style.gridTemplateColumns = `repeat(${cols}, ${sz}px)`;
    boardEl.style.gap = `${gap}px`;
    boardEl.innerHTML = '';

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell hidden';
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.style.width = `${sz}px`;
        cell.style.height = `${sz}px`;
        cell.style.fontSize = `${Math.max(10, sz * 0.55)}px`;

        // Touch handling: single tap = reveal, double tap = flag
        let lastTap = 0;

        cell.addEventListener('touchend', (e) => {
          e.preventDefault();
          const now = Date.now();
          const timeSinceLast = now - lastTap;
          if (timeSinceLast < 300 && timeSinceLast > 0) {
            // Double tap — flag
            onFlag(r, c);
          } else {
            // Single tap — reveal (with small delay to allow double tap to cancel)
            setTimeout(() => {
              if (Date.now() - lastTap >= 300) onTap(r, c);
            }, 300);
          }
          lastTap = now;
          spawnTouchBubbles(e.changedTouches[0]);
        });

        // Desktop fallback
        cell.addEventListener('click', () => onTap(r, c));
        cell.addEventListener('contextmenu', (e) => { e.preventDefault(); onFlag(r, c); });

        boardEl.appendChild(cell);
      }
    }
  }

  function getCell(r, c) {
    return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  }

  function onTap(r, c) {
    if (gameOver || gameWon || flagged[r][c] || revealed[r][c]) return;

    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      timerInterval = setInterval(() => {
        seconds = Math.min(seconds + 1, 999);
        document.getElementById('timer').textContent = seconds;
      }, 1000);
    }

    if (board[r][c] === -1) {
      triggerGameOver(r, c);
      return;
    }

    reveal(r, c);
    checkWin();
  }

  function onFlag(r, c) {
    if (gameOver || gameWon || revealed[r][c]) return;
    flagged[r][c] = !flagged[r][c];
    flagCount += flagged[r][c] ? 1 : -1;
    document.getElementById('mine-count').textContent = mineCount - flagCount;
    const cell = getCell(r, c);
    if (flagged[r][c]) {
      cell.classList.add('flagged');
      cell.textContent = '🍖';
    } else {
      cell.classList.remove('flagged');
      cell.textContent = '';
    }
  }

  function reveal(r, c) {
    if (r < 0 || r >= rows || c < 0 || c >= cols) return;
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;

    const cell = getCell(r, c);
    cell.classList.remove('hidden', 'flagged');
    cell.classList.add('revealed');

    if (board[r][c] > 0) {
      cell.textContent = board[r][c];
      cell.classList.add(`n${board[r][c]}`);
    } else if (board[r][c] === 0) {
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++)
          if (dr !== 0 || dc !== 0) reveal(r+dr, c+dc);
    }
  }

  function triggerGameOver(hitR, hitC) {
    gameOver = true;
    clearInterval(timerInterval);

    const cell = getCell(hitR, hitC);
    cell.classList.remove('hidden');
    cell.classList.add('mine-hit');
    cell.textContent = '🐙';

    setTimeout(() => {
      mineLocations.forEach(([r, c]) => {
        if (r === hitR && c === hitC) return;
        const mc = getCell(r, c);
        if (!flagged[r][c]) {
          mc.classList.remove('hidden', 'flagged');
          mc.classList.add('revealed', 'mine-revealed');
          mc.textContent = '🐙';
        }
      });

      spawnTentacles();
      document.getElementById('msg-icon').textContent = '🦑';
      document.getElementById('msg-title').textContent = 'CAUGHT!';
      document.getElementById('msg-sub').textContent = `The Kraken got you after ${seconds}s — but he's happy about it!`;
      document.getElementById('overlay').classList.add('show');
    }, 500);
  }

  function checkWin() {
    let unrevealedSafe = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (!revealed[r][c] && board[r][c] !== -1) unrevealedSafe++;

    if (unrevealedSafe === 0) {
      gameWon = true;
      clearInterval(timerInterval);
      document.getElementById('msg-icon').textContent = '⚓';
      document.getElementById('msg-title').textContent = 'ACCEPTANCE!';
      document.getElementById('msg-sub').textContent = `You charted the depths and satiated Zee Kraken in ${seconds}s. He allows the pets!`;
      setTimeout(() => document.getElementById('overlay').classList.add('show'), 400);
    }
  }

  /* ============================================================
     CANVAS TENTACLE SYSTEM (same as desktop)
  ============================================================ */
  const TC = { canvas: null, ctx: null, tentacles: [], running: false, startT: 0 };

  function tcInit() {
    TC.canvas = document.getElementById('tentacle-canvas');
    TC.ctx = TC.canvas.getContext('2d');
    tcResize();
    window.addEventListener('resize', tcResize);
  }

  function tcResize() {
    if (!TC.canvas) return;
    const dpr = window.devicePixelRatio || 1;
    TC.canvas.width = window.innerWidth * dpr;
    TC.canvas.height = window.innerHeight * dpr;
    TC.canvas.style.width = window.innerWidth + 'px';
    TC.canvas.style.height = window.innerHeight + 'px';
    TC.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function makeTentacle(opts) {
    const segCount = 32;
    const totalLen = 480 + Math.random() * 200;
    const segLen = totalLen / segCount;
    const baseWidth = 50 + Math.random() * 14;
    const tipWidth = 2.5;
    const dir = opts.side === 'cw' ? 1 : -1;
    const spiralStrength = 0.18 + Math.random() * 0.06;
    const segs = [];
    for (let i = 0; i < segCount; i++) {
      const t = i / (segCount - 1);
      const w = baseWidth * Math.pow(1 - t, 0.55) + tipWidth;
      const targetCurl = dir * spiralStrength * Math.pow(t, 0.5);
      segs.push({
        len: segLen, width: w, currentAngle: 0, targetAngle: targetCurl,
        startFraction: t * 0.7,
        wobbleAmp: 0.012 + Math.random() * 0.012,
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleFreq: 1.5 + Math.random() * 1.5,
      });
    }
    return { anchorX: opts.x, anchorY: opts.y, baseAngle: opts.baseAngle, segs,
      base: opts.palette[0], hi: opts.palette[1], delay: opts.delay, spawnDur: opts.spawnDur,
      dir, birthTime: null };
  }

  function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

  function updateTentacle(tent, elapsed) {
    if (tent.birthTime === null) tent.birthTime = elapsed;
    const localT = elapsed - tent.birthTime - tent.delay;
    if (localT < 0) return false;
    for (const seg of tent.segs) {
      const segProgress = Math.min(1, Math.max(0,
        (localT / tent.spawnDur - seg.startFraction) / (1 - seg.startFraction)
      ));
      const eased = easeOutCubic(segProgress);
      const wobble = segProgress >= 1 ? Math.sin(elapsed * seg.wobbleFreq + seg.wobblePhase) * seg.wobbleAmp : 0;
      seg.currentAngle = seg.targetAngle * eased + wobble;
    }
    return true;
  }

  function drawTentacle(ctx, tent) {
    let x = tent.anchorX, y = tent.anchorY;
    let angle = tent.baseAngle;
    const pts = [{ x, y, w: tent.segs[0].width, angle }];
    for (const seg of tent.segs) {
      angle += seg.currentAngle;
      x += Math.cos(angle) * seg.len;
      y += Math.sin(angle) * seg.len;
      pts.push({ x, y, w: seg.width, angle });
    }
    const left = [], right = [];
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      const nx = -Math.sin(p.angle), ny = Math.cos(p.angle);
      left.push({ x: p.x + nx * p.w, y: p.y + ny * p.w });
      right.push({ x: p.x - nx * p.w, y: p.y - ny * p.w });
    }
    ctx.beginPath();
    ctx.moveTo(left[0].x, left[0].y);
    for (let i = 1; i < left.length - 1; i++) {
      const mx = (left[i].x + left[i+1].x) / 2, my = (left[i].y + left[i+1].y) / 2;
      ctx.quadraticCurveTo(left[i].x, left[i].y, mx, my);
    }
    ctx.lineTo(left[left.length-1].x, left[left.length-1].y);
    for (let i = right.length - 2; i > 0; i--) {
      const mx = (right[i].x + right[i-1].x) / 2, my = (right[i].y + right[i-1].y) / 2;
      ctx.quadraticCurveTo(right[i].x, right[i].y, mx, my);
    }
    ctx.lineTo(right[0].x, right[0].y);
    ctx.closePath();
    const grad = ctx.createLinearGradient(tent.anchorX, tent.anchorY, pts[pts.length-1].x, pts[pts.length-1].y);
    grad.addColorStop(0, tent.hi); grad.addColorStop(0.55, tent.base); grad.addColorStop(1, tent.base);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      const nx = -Math.sin(p.angle) * tent.dir, ny = Math.cos(p.angle) * tent.dir;
      const hx = p.x + nx * p.w * 0.55, hy = p.y + ny * p.w * 0.55;
      if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.strokeStyle = tent.hi; ctx.globalAlpha = 0.35; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke(); ctx.globalAlpha = 1;
    for (let i = 2; i < pts.length - 2; i += 2) {
      const p = pts[i];
      const sideSign = -tent.dir;
      const nx = -Math.sin(p.angle) * sideSign, ny = Math.cos(p.angle) * sideSign;
      const sx = p.x + nx * p.w * 0.55, sy = p.y + ny * p.w * 0.55;
      const sr = p.w * 0.30;
      if (sr < 1) continue;
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fillStyle = tent.hi; ctx.globalAlpha = 0.85; ctx.fill();
      ctx.beginPath(); ctx.arc(sx, sy, sr * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill(); ctx.globalAlpha = 1;
    }
  }

  function tcLoop(now) {
    if (!TC.running) return;
    const elapsed = (now - TC.startT) / 1000;
    const ctx = TC.ctx;
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    for (const t of TC.tentacles) {
      ctx.save(); ctx.shadowColor = t.base; ctx.shadowBlur = 18;
      const alive = updateTentacle(t, elapsed);
      if (alive) drawTentacle(ctx, t);
      ctx.restore();
    }
    requestAnimationFrame(tcLoop);
  }

  function spawnTentacles() {
    if (!TC.canvas) tcInit();
    tcResize();
    TC.canvas.classList.add('active');
    TC.tentacles = [];
    const palettes = [['#c0404a','#f0a0a8'],['#a83040','#e88090'],['#b84858','#f0b0b8'],['#903040','#d07080'],['#c05060','#f0b8c0']];
    const W = window.innerWidth, H = window.innerHeight;
    for (let i = 0; i < 14; i++) {
      const edge = i % 4;
      let x, y, baseAngle;
      if (edge === 0) { x = W*(0.1+Math.random()*0.8); y=-10; baseAngle=Math.PI/2+(Math.random()-0.5)*0.6; }
      else if (edge === 1) { x=W+10; y=H*(0.1+Math.random()*0.8); baseAngle=Math.PI+(Math.random()-0.5)*0.6; }
      else if (edge === 2) { x=W*(0.1+Math.random()*0.8); y=H+10; baseAngle=-Math.PI/2+(Math.random()-0.5)*0.6; }
      else { x=-10; y=H*(0.1+Math.random()*0.8); baseAngle=(Math.random()-0.5)*0.6; }
      TC.tentacles.push(makeTentacle({ x, y, baseAngle, palette: palettes[Math.floor(Math.random()*palettes.length)],
        side: Math.random()>0.5?'cw':'ccw', delay: i*0.06, spawnDur: 1.2 }));
    }
    TC.startT = performance.now(); TC.running = true;
    requestAnimationFrame(tcLoop);
  }

  function tcStop() {
    TC.running = false;
    if (TC.canvas) { TC.canvas.classList.remove('active'); TC.ctx && TC.ctx.clearRect(0,0,window.innerWidth,window.innerHeight); }
    TC.tentacles = [];
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    tcStop();
    initGame();
  }

  // Touch bubble effect
  function spawnTouchBubbles(touch) {
    const count = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = 'click-bubble';
      const size = 5 + Math.random() * 10;
      const offsetX = (Math.random() - 0.5) * 24;
      const offsetY = (Math.random() - 0.5) * 24;
      b.style.cssText = `width:${size}px;height:${size}px;left:${touch.clientX+offsetX-size/2}px;top:${touch.clientY+offsetY-size/2}px;--bdrift:${(Math.random()-0.5)*40}px;animation-delay:${Math.random()*0.1}s;animation-duration:${0.6+Math.random()*0.4}s;`;
      document.body.appendChild(b);
      b.addEventListener('animationend', () => b.remove());
    }
  }

  // Floating bubbles
  function makeBubbles() {
    const container = document.getElementById('bubbles');
    for (let i = 0; i < 14; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 4 + Math.random() * 16;
      b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*12}s;--drift:${(Math.random()-0.5)*60}px;`;
      container.appendChild(b);
    }
  }

  makeBubbles();
  initGame();

  // Register service worker for PWA / offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.error);
  }
</script>
