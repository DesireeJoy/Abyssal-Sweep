<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Deep sea background -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d2b4e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c05878"/>
      <stop offset="100%" stop-color="#7a2040"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f8e870"/>
      <stop offset="100%" stop-color="#c8a820"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Subtle water shimmer lines -->
  <line x1="0" y1="120" x2="512" y2="110" stroke="rgba(125,216,248,0.06)" stroke-width="18"/>
  <line x1="0" y1="200" x2="512" y2="215" stroke="rgba(125,216,248,0.04)" stroke-width="14"/>

  <!-- Tentacles (drawn behind body) -->
  <!-- Left tentacles -->
  <path d="M 220 310 Q 160 370 130 430 Q 120 460 110 490" stroke="#a03050" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 200 320 Q 120 390 80 440" stroke="#a03050" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 240 330 Q 190 410 170 470" stroke="#a03050" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 185 305 Q 100 360 60 390" stroke="#a03050" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Right tentacles -->
  <path d="M 292 310 Q 350 370 380 430 Q 390 460 400 490" stroke="#a03050" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 310 320 Q 390 390 430 440" stroke="#a03050" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 272 330 Q 320 410 340 470" stroke="#a03050" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 325 305 Q 410 360 450 390" stroke="#a03050" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Tentacle suckers (small dots) -->
  <circle cx="155" cy="397" r="6" fill="#c06080" opacity="0.8"/>
  <circle cx="138" cy="420" r="5" fill="#c06080" opacity="0.8"/>
  <circle cx="123" cy="445" r="4" fill="#c06080" opacity="0.7"/>
  <circle cx="95" cy="418" r="5" fill="#c06080" opacity="0.7"/>
  <circle cx="357" cy="397" r="6" fill="#c06080" opacity="0.8"/>
  <circle cx="372" cy="420" r="5" fill="#c06080" opacity="0.8"/>
  <circle cx="387" cy="445" r="4" fill="#c06080" opacity="0.7"/>
  <circle cx="415" cy="418" r="5" fill="#c06080" opacity="0.7"/>

  <!-- Kraken mantle (body) -->
  <ellipse cx="256" cy="210" rx="110" ry="140" fill="url(#bodyGrad)"/>

  <!-- Mantle highlight -->
  <ellipse cx="230" cy="170" rx="45" ry="60" fill="rgba(255,180,200,0.18)"/>

  <!-- Head -->
  <ellipse cx="256" cy="290" rx="90" ry="70" fill="url(#bodyGrad)"/>

  <!-- Eyes -->
  <ellipse cx="218" cy="278" rx="22" ry="22" fill="url(#eyeGrad)"/>
  <ellipse cx="294" cy="278" rx="22" ry="22" fill="url(#eyeGrad)"/>
  <!-- Pupils -->
  <ellipse cx="222" cy="280" rx="10" ry="13" fill="#1a0820"/>
  <ellipse cx="298" cy="280" rx="10" ry="13" fill="#1a0820"/>
  <!-- Eye shine -->
  <circle cx="226" cy="274" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="302" cy="274" r="4" fill="rgba(255,255,255,0.7)"/>

  <!-- Beak / smile -->
  <path d="M 238 308 Q 256 322 274 308" stroke="#5a1030" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Fin-like wings on mantle -->
  <path d="M 148 200 Q 120 180 130 150 Q 148 170 168 190 Z" fill="#903050"/>
  <path d="M 364 200 Q 392 180 382 150 Q 364 170 344 190 Z" fill="#903050"/>

  <!-- Glowing border ring -->
  <rect width="512" height="512" rx="80" fill="none" stroke="#2a5a7a" stroke-width="6"/>

  <!-- Title text -->
  <text x="256" y="488" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#7dd8f8" opacity="0.9" letter-spacing="2">SWEEP</text>
</svg>
